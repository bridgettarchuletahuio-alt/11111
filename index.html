<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>链接分配器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 18px;
        }
        .session-tools {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .account-pill {
            background: #e8f4f8;
            color: #0056b3;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
        }
        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-button {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 4px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .tab-button.active {
            background: #0066cc;
            color: white;
            border-color: #0066cc;
        }
        .tab-content {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 4px;
        }
        .tab-content.active {
            display: block;
        }
        h2 {
            margin-bottom: 15px;
            color: #333;
        }
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }
        button {
            background: #0066cc;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover {
            background: #0051a8;
        }
        .secondary-btn {
            background: #6c757d;
        }
        .secondary-btn:hover {
            background: #5a6268;
        }
        #output {
            margin-top: 20px;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
        }
        .link-box {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 4px;
            border-left: 4px solid #0066cc;
        }
        .link-box label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        .link-box input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 3px;
            font-family: monospace;
            font-size: 13px;
        }
        .link-box button {
            margin-top: 8px;
            width: 100%;
            background: #28a745;
            font-size: 14px;
            padding: 8px;
        }
        .link-box button:hover {
            background: #218838;
        }
        .copy-btn {
            background: #28a745;
        }
        .copy-btn:hover {
            background: #218838;
        }
        .success-msg {
            color: #28a745;
            margin-top: 10px;
            font-size: 14px;
        }
        .info-text {
            background: #e8f4f8;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #0056b3;
        }
        .panel {
            margin-top: 20px;
            border: 1px solid #e6e6e6;
            border-radius: 6px;
            padding: 14px;
            background: #fafafa;
        }
        .panel h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 17px;
        }
        .mini-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .mini-row input {
            flex: 1;
            min-width: 180px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: monospace;
        }
        .mini-btn {
            margin-top: 0;
            padding: 10px 12px;
            font-size: 14px;
            white-space: nowrap;
        }
        .history-item,
        .stat-item {
            background: white;
            border: 1px solid #ececec;
            border-radius: 5px;
            padding: 10px;
            margin-top: 8px;
        }
        .history-meta {
            color: #666;
            font-size: 12px;
            margin-top: 4px;
        }
        .url-preview {
            margin-top: 6px;
            word-break: break-all;
            color: #0066cc;
            font-size: 13px;
        }
        .empty-text {
            color: #777;
            font-size: 14px;
            padding: 8px 0;
        }
        .muted-note {
            margin-top: 8px;
            color: #666;
            font-size: 12px;
        }
        .sublink-editor {
            margin-top: 12px;
            border: 1px solid #e7e7e7;
            border-radius: 6px;
            background: #fff;
            padding: 12px;
        }
        .sublink-row {
            display: flex;
            gap: 8px;
            align-items: center;
            border: 1px solid #ececec;
            border-radius: 5px;
            padding: 8px;
            margin-top: 8px;
        }
        .sublink-index {
            color: #555;
            font-size: 12px;
            min-width: 36px;
            text-align: center;
        }
        .sublink-url {
            flex: 1;
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
            color: #0d4f9c;
        }
        .danger-btn {
            background: #d9534f;
        }
        .danger-btn:hover {
            background: #c94743;
        }

        /* 密码保护遮罩 */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: #f5f5f5;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #auth-overlay .auth-box {
            background: white;
            padding: 36px 32px;
            border-radius: 8px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }
        #auth-overlay .auth-box h2 {
            margin-bottom: 8px;
            color: #333;
            font-size: 22px;
        }
        #auth-overlay .auth-box p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        #auth-overlay .auth-tip {
            font-size: 12px;
            color: #888;
            margin-top: -10px;
            margin-bottom: 16px;
        }
        #auth-overlay .auth-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 12px;
        }
        #auth-overlay .auth-box button {
            width: 100%;
            margin-top: 0;
        }
        #auth-error {
            color: #dc3545;
            font-size: 13px;
            margin-top: 8px;
            min-height: 18px;
        }
        @media (max-width: 640px) {
            .topbar {
                flex-direction: column;
                align-items: stretch;
            }
            .session-tools {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <!-- 密码保护遮罩 -->
    <div id="auth-overlay">
        <div class="auth-box">
            <h2>🔒 访问验证</h2>
            <p>请输入 8 位密码以继续访问</p>
            <div class="auth-tip">不同密码登录后，只能查看和生成属于自己的短链记录。</div>
            <input type="password" id="auth-input" placeholder="请输入 8 位密码" maxlength="32" autocomplete="current-password">
            <button onclick="checkPassword()">确认</button>
            <div id="auth-error"></div>
        </div>
    </div>

    <div class="container">
        <div class="topbar">
            <h1>🔗 链接分配器</h1>
            <div class="session-tools">
                <div id="accountInfo" class="account-pill" hidden></div>
                <button id="logoutButton" class="secondary-btn" onclick="logout()" hidden>切换密码</button>
            </div>
        </div>
        
        <div class="mode-selector">
            <button class="tab-button active" onclick="switchTab('merge')">合并链接</button>
            <button class="tab-button" onclick="switchTab('distribute')">分配链接</button>
        </div>

        <!-- 合并链接模式 -->
        <div id="merge" class="tab-content active">
            <h2>合并链接</h2>
            <div class="info-text">
                📌 输入多个链接，生成一个特殊URL。用户访问该URL后会按顺序获取每个链接。
            </div>
            <textarea id="mergeInput" rows="8" placeholder="输入链接，每行一个，例如：
https://wa.me/123?text=START
https://wa.me/456?text=START
https://wa.me/789?text=START"></textarea>
            <button onclick="mergeLinks()">生成合并链接</button>
            <div id="mergeOutput"></div>

            <div class="panel">
                <div class="mini-row" style="justify-content: space-between; align-items: center;">
                    <h3>历史记录</h3>
                    <button class="mini-btn" onclick="fetchHistory()">刷新历史</button>
                </div>
                <div id="historyOutput" class="empty-text">正在加载历史记录...</div>
                <div id="sublinkEditor" class="sublink-editor" hidden>
                    <div class="mini-row" style="justify-content: space-between; align-items: center;">
                        <strong id="sublinkEditorTitle">子链接管理</strong>
                        <button class="mini-btn secondary-btn" onclick="closeSublinkEditor()">关闭</button>
                    </div>
                    <div class="muted-note">历史合并链接不会被修改或删除。你在这里编辑的是副本，点击“保存修改”只会保存当前页面草稿，不会自动生成新合并链接。</div>
                    <div class="mini-row" style="margin-top: 10px;">
                        <button class="mini-btn" onclick="addSublink()">新增子链接</button>
                        <button class="mini-btn" onclick="saveSublinkDraft()">保存修改</button>
                    </div>
                    <div id="sublinkList" class="empty-text">请选择一个历史任务。</div>
                </div>
                <div class="muted-note">说明：历史生成记录永久保留，不支持删除历史任务。</div>
            </div>

            <div class="panel">
                <h3>点击统计</h3>
                <div class="mini-row" style="margin-bottom: 10px;">
                    <input id="statsIdInput" type="text" placeholder="输入合并链接ID，例如：abc123">
                    <button class="mini-btn" onclick="fetchStatsByInput()">查询统计</button>
                </div>
                <div id="statsOutput" class="empty-text">输入ID后可查看每个链接点击次数。</div>
            </div>
        </div>

        <!-- 分配链接模式 -->
        <div id="distribute" class="tab-content">
            <h2>分配链接</h2>
            <div class="info-text">
                📌 粘贴已生成的合并链接，它会按顺序分配每个链接给用户。
            </div>
            <label>粘贴你的短链接：</label>
            <textarea id="distributeInput" rows="3" placeholder="例如：https://example.com/redirect.html#abc123" style="margin-top: 10px;"></textarea>
            <button onclick="openDistributedLink()" style="width: 100%; margin-top: 10px;">🚀 打开链接</button>
            <div id="distributeOutput" style="margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        const MIGRATION_CONFIG = {
            useWorker: true,
            workerBaseUrl: 'https://bx-group.uk',
            legacyScriptUrl: 'https://script.google.com/macros/s/AKfycbwMYWgW6oBK1VFGhQVfdMiaE-wJU8MSGNLqvwgqvTUPsQJyZswdC_LxKTmqrv8l7IVM/exec',
            legacyPublicBaseUrl: 'https://bridgettarchuletahuio-alt.github.io/11111/'
        };
        const AUTH_STORAGE_KEY = 'link_dispatch_password';
        let currentOwner = null;
        const historySetMap = new Map();
        let activeHistorySetId = '';
        let editableSublinks = [];

        const normalizedWorkerBaseUrl = MIGRATION_CONFIG.workerBaseUrl.replace(/\/+$/, '');
        const SCRIPT_URL = MIGRATION_CONFIG.useWorker
            ? normalizedWorkerBaseUrl + '/api'
            : MIGRATION_CONFIG.legacyScriptUrl;
        const PUBLIC_BASE_URL = MIGRATION_CONFIG.useWorker
            ? normalizedWorkerBaseUrl + '/'
            : MIGRATION_CONFIG.legacyPublicBaseUrl;
        const SHORT_LINK_MODE = MIGRATION_CONFIG.useWorker ? 'worker' : 'legacy';

        function getBaseUrl() {
            return PUBLIC_BASE_URL;
        }

        function buildShortUrl(id) {
            const baseUrl = getBaseUrl();
            return SHORT_LINK_MODE === 'worker'
                ? baseUrl.replace(/\/+$/, '') + '/r/' + id
                : baseUrl + 'redirect.html#' + id;
        }

        function getStoredPassword() {
            return sessionStorage.getItem(AUTH_STORAGE_KEY) || '';
        }

        function setStoredPassword(password) {
            sessionStorage.setItem(AUTH_STORAGE_KEY, password);
        }

        function clearStoredPassword() {
            sessionStorage.removeItem(AUTH_STORAGE_KEY);
        }

        function isAuthErrorMessage(message) {
            return /unauthorized|密码|登录/i.test(String(message || ''));
        }

        async function apiPost(payload, options = {}) {
            const requestPayload = { ...payload };
            if (!options.skipStoredPassword) {
                const storedPassword = getStoredPassword();
                if (storedPassword && !requestPayload.password) {
                    requestPayload.password = storedPassword;
                }
            }

            const postResp = await fetch(SCRIPT_URL, {
                method: 'POST',
                redirect: 'follow',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8'
                },
                body: JSON.stringify(requestPayload)
            });

            const postText = await postResp.text();
            const parsed = tryParseJson(postText);

            if (!postResp.ok) {
                const errorMessage = parsed && typeof parsed === 'object' && parsed.error
                    ? parsed.error
                    : (typeof parsed === 'string' && parsed.trim() ? parsed.trim() : '请求失败');
                throw new Error(errorMessage);
            }

            if (parsed && typeof parsed === 'object' && parsed.error) {
                throw new Error(parsed.error);
            }

            return parsed;
        }

        function tryParseJson(text) {
            try {
                return JSON.parse(text);
            } catch (e) {
                return text;
            }
        }

        function extractIdFromResponse(payload) {
            if (!payload) return null;
            if (typeof payload === 'string') {
                const trimmed = payload.trim();
                return trimmed || null;
            }

            return payload.id || payload.hash || payload.key || payload.code ||
                (payload.data && (payload.data.id || payload.data.hash || payload.data.key)) || null;
        }

        async function createOnlineSet(links) {
            const payload = await apiPost({ action: 'createSet', links });
            const id = extractIdFromResponse(payload);
            if (!id) {
                throw new Error('接口未返回有效ID');
            }
            return id;
        }

        function updateSessionUi(owner) {
            currentOwner = owner || null;
            const accountInfo = document.getElementById('accountInfo');
            const logoutButton = document.getElementById('logoutButton');

            if (owner) {
                accountInfo.hidden = false;
                accountInfo.textContent = owner.label + ' 已登录';
                logoutButton.hidden = false;
                return;
            }

            accountInfo.hidden = true;
            accountInfo.textContent = '';
            logoutButton.hidden = true;
        }

        function showLockedState(message) {
            document.getElementById('auth-overlay').style.display = 'flex';
            document.getElementById('auth-error').textContent = message || '';
            updateSessionUi(null);
            document.getElementById('historyOutput').className = 'empty-text';
            document.getElementById('historyOutput').textContent = '登录后可查看当前密码的历史记录。';
            document.getElementById('statsOutput').className = 'empty-text';
            document.getElementById('statsOutput').textContent = '登录后输入ID可查看该密码下的点击统计。';
        }

        function unlockForOwner(owner) {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('auth-error').textContent = '';
            document.getElementById('auth-input').value = '';
            updateSessionUi(owner);
            fetchHistory();
        }

        function handleAuthFailure(error) {
            if (!error || !isAuthErrorMessage(error.message)) {
                return false;
            }

            clearStoredPassword();
            showLockedState('登录已失效，请重新输入密码。');
            document.getElementById('auth-input').focus();
            return true;
        }

        async function restoreLogin() {
            const storedPassword = getStoredPassword();
            if (!storedPassword) {
                showLockedState('');
                document.getElementById('auth-input').focus();
                return;
            }

            try {
                const payload = await apiPost({ action: 'login', password: storedPassword }, { skipStoredPassword: true });
                unlockForOwner(payload.owner);
            } catch (error) {
                clearStoredPassword();
                showLockedState('登录已失效，请重新输入密码。');
                document.getElementById('auth-input').focus();
            }
        }

        function logout() {
            clearStoredPassword();
            document.getElementById('mergeOutput').innerHTML = '';
            document.getElementById('statsIdInput').value = '';
            document.getElementById('distributeOutput').textContent = '';
            showLockedState('');
            document.getElementById('auth-input').focus();
        }

        function extractHistoryItems(payload) {
            if (!payload || typeof payload !== 'object') return [];

            const direct = payload.items || payload.history || [];
            const nested = payload.data && (payload.data.items || payload.data.history) || [];
            const list = Array.isArray(direct) ? direct : (Array.isArray(nested) ? nested : []);

            return list.filter(item => item && typeof item === 'object');
        }

        function extractStats(payload) {
            if (!payload || typeof payload !== 'object') return [];

            const direct = payload.stats || payload.items || [];
            const nested = payload.data && (payload.data.stats || payload.data.items) || [];
            const list = Array.isArray(direct) ? direct : (Array.isArray(nested) ? nested : []);

            return list.map((item, idx) => {
                if (typeof item === 'string') {
                    return { index: idx, url: item, clicks: 0 };
                }
                return {
                    index: item.index != null ? item.index : idx,
                    url: item.url || item.link || item.target || '',
                    clicks: Number(item.clicks || item.count || 0)
                };
            });
        }

        function setStatsId(id) {
            const input = document.getElementById('statsIdInput');
            input.value = id;
            fetchStats(id);
        }

        function prefillStatsId(id) {
            document.getElementById('statsIdInput').value = id;
            const output = document.getElementById('statsOutput');
            output.className = 'empty-text';
            output.textContent = '已填入最新ID，点击“查询统计”即可查看。';
        }

        function fetchStatsByInput() {
            const id = document.getElementById('statsIdInput').value.trim();
            if (!id) {
                alert('请先输入链接ID！');
                return;
            }
            fetchStats(id);
        }

        async function fetchHistory() {
            const output = document.getElementById('historyOutput');
            output.className = 'empty-text';
            output.textContent = '历史加载中...';
            historySetMap.clear();

            try {
                const payload = await apiPost({ action: 'listSets', limit: 20 });
                const items = extractHistoryItems(payload);

                if (items.length === 0) {
                    output.className = 'empty-text';
                    output.textContent = '当前密码下暂无历史记录。';
                    return;
                }

                output.className = '';
                output.innerHTML = items.map(item => {
                    const id = item.id || item.hash || item.key || '';
                    if (id) {
                        historySetMap.set(id, item);
                    }
                    const createdAt = item.createdAt || item.created_at || item.time || '-';
                    const count = item.count != null ? item.count : (Array.isArray(item.links) ? item.links.length : '-');
                    const ownerLabel = item.ownerLabel || item.owner_label || '';
                    const shortUrl = buildShortUrl(id);
                    const ownerText = ownerLabel ? ' | 归属: ' + ownerLabel : '';

                    return `
                        <div class="history-item">
                            <div><strong>ID:</strong> ${id || '(未知)'}</div>
                            <div class="history-meta">创建时间: ${createdAt} | 链接数: ${count}${ownerText}</div>
                            <div class="url-preview">${shortUrl}</div>
                            <div class="mini-row" style="margin-top: 8px;">
                                <button class="mini-btn copy-btn" onclick="copyText('${shortUrl.replace(/'/g, "&#39;")}', this)">复制短链</button>
                                <button class="mini-btn" onclick="setStatsId('${String(id).replace(/'/g, "&#39;")}')">查看统计</button>
                                <button class="mini-btn secondary-btn" onclick="openSublinkEditor('${String(id).replace(/'/g, "&#39;")}')">管理子链接</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                if (handleAuthFailure(error)) {
                    return;
                }
                output.className = 'empty-text';
                output.textContent = '历史加载失败：' + error.message;
            }
        }

        function closeSublinkEditor() {
            activeHistorySetId = '';
            editableSublinks = [];
            document.getElementById('sublinkEditor').hidden = true;
            document.getElementById('sublinkList').className = 'empty-text';
            document.getElementById('sublinkList').textContent = '请选择一个历史任务。';
        }

        function openSublinkEditor(id) {
            const item = historySetMap.get(id);
            if (!item) {
                alert('未找到该历史任务，请先刷新历史。');
                return;
            }

            const links = Array.isArray(item.links)
                ? item.links.map(link => String(link || '').trim()).filter(Boolean)
                : [];

            if (links.length === 0) {
                alert('该任务暂无可编辑的子链接。');
                return;
            }

            activeHistorySetId = id;
            editableSublinks = links;

            const editor = document.getElementById('sublinkEditor');
            editor.hidden = false;
            document.getElementById('sublinkEditorTitle').textContent = '子链接管理（来源ID: ' + id + '）';
            renderSublinkList();
        }

        function renderSublinkList() {
            const list = document.getElementById('sublinkList');
            if (!Array.isArray(editableSublinks) || editableSublinks.length === 0) {
                list.className = 'empty-text';
                list.textContent = '当前没有子链接，请先新增。';
                return;
            }

            list.className = '';
            list.innerHTML = editableSublinks.map((url, idx) => `
                <div class="sublink-row">
                    <div class="sublink-index">#${idx}</div>
                    <div class="sublink-url">${url}</div>
                    <button class="mini-btn" onclick="editSublink(${idx})">编辑</button>
                    <button class="mini-btn danger-btn" onclick="removeSublink(${idx})">删除</button>
                </div>
            `).join('');
        }

        function addSublink() {
            if (!activeHistorySetId) {
                alert('请先选择一个历史任务。');
                return;
            }

            const input = prompt('请输入新的子链接（http/https）');
            if (input == null) return;

            const link = String(input || '').trim();
            if (!/^https?:\/\//i.test(link)) {
                alert('链接格式无效，请输入 http:// 或 https:// 开头的地址。');
                return;
            }

            editableSublinks.push(link);
            renderSublinkList();
        }

        function editSublink(index) {
            if (!activeHistorySetId || index < 0 || index >= editableSublinks.length) {
                return;
            }

            const oldValue = editableSublinks[index];
            const input = prompt('编辑子链接（http/https）', oldValue);
            if (input == null) return;

            const nextValue = String(input || '').trim();
            if (!/^https?:\/\//i.test(nextValue)) {
                alert('链接格式无效，请输入 http:// 或 https:// 开头的地址。');
                return;
            }

            editableSublinks[index] = nextValue;
            renderSublinkList();
        }

        function removeSublink(index) {
            if (!activeHistorySetId || index < 0 || index >= editableSublinks.length) {
                return;
            }

            if (editableSublinks.length <= 1) {
                alert('至少保留 1 个子链接。');
                return;
            }

            const ok = confirm('确认删除这个子链接吗？');
            if (!ok) return;

            editableSublinks.splice(index, 1);
            renderSublinkList();
        }

        async function saveSublinkDraft() {
            if (!activeHistorySetId) {
                alert('请先选择一个历史任务。');
                return;
            }

            if (!Array.isArray(editableSublinks) || editableSublinks.length === 0) {
                alert('请至少保留一个子链接。');
                return;
            }

            const saveBtn = document.querySelector('#sublinkEditor .mini-btn:last-of-type');
            if (saveBtn) {
                saveBtn.textContent = '保存中...';
                saveBtn.disabled = true;
            }

            try {
                await apiPost({ action: 'updateSet', id: activeHistorySetId, links: editableSublinks.slice() });

                const targetItem = historySetMap.get(activeHistorySetId);
                if (targetItem) {
                    targetItem.links = editableSublinks.slice();
                    targetItem.count = editableSublinks.length;
                }

                renderSublinkList();

                const outputDiv = document.getElementById('mergeOutput');
                const shortUrl = buildShortUrl(activeHistorySetId);
                outputDiv.innerHTML = `
                    <div class="link-box">
                        <label>✅ 已成功保存修改（共 ${editableSublinks.length} 个链接）</label>
                        <input type="text" value="${shortUrl}" readonly style="margin-top: 10px; font-size: 14px;">
                        <button class="copy-btn" onclick="copyToClipboard(this)">📋 复制链接</button>
                        <div class="success-msg">原短链 ${activeHistorySetId} 保持不变，子链接已在服务端更新，轮询计数继续保持。</div>
                    </div>
                `;
            } catch (error) {
                if (handleAuthFailure(error)) return;
                alert('保存失败：' + error.message);
            } finally {
                if (saveBtn) {
                    saveBtn.textContent = '保存修改';
                    saveBtn.disabled = false;
                }
            }
        }

        async function fetchStats(id) {
            const output = document.getElementById('statsOutput');
            output.className = 'empty-text';
            output.textContent = '统计加载中...';

            try {
                const payload = await apiPost({ action: 'getStats', id });
                const rows = extractStats(payload);

                if (rows.length === 0) {
                    output.className = 'empty-text';
                    output.textContent = '当前密码下暂无统计数据。';
                    return;
                }

                output.className = '';
                output.innerHTML = rows.map(row => `
                    <div class="stat-item">
                        <div><strong>#${row.index}</strong> 点击次数: <strong>${row.clicks}</strong></div>
                        <div class="url-preview">${row.url || '(无URL)'}</div>
                    </div>
                `).join('');
            } catch (error) {
                if (handleAuthFailure(error)) {
                    return;
                }
                output.className = 'empty-text';
                output.textContent = '统计查询失败：' + error.message;
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(btn => {
                if ((tab === 'merge' && btn.textContent.includes('合并')) ||
                    (tab === 'distribute' && btn.textContent.includes('分配'))) {
                    btn.classList.add('active');
                }
            });
        }

        async function mergeLinks() {
            try {
                const input = document.getElementById('mergeInput').value.trim();
                if (!input) {
                    alert('请输入至少一个链接！');
                    return;
                }
                
                const links = input.split('\n')
                    .map(link => link.trim())
                    .filter(link => link && link.startsWith('http'));
                
                if (links.length === 0) {
                    alert('未找到有效的链接！请确保每个链接都以http://或https://开头');
                    return;
                }

                // 通过在线表格接口创建共享ID，确保不同设备都可访问。
                const id = await createOnlineSet(links);
                
                // 生成完整的短链接URL
                const mergedUrl = buildShortUrl(id);

                // 显示结果
                const outputDiv = document.getElementById('mergeOutput');
                outputDiv.innerHTML = `
                    <div class="link-box">
                        <label>✅ 成功生成短链接！(${links.length} 个)</label>
                        <input type="text" value="${mergedUrl}" readonly style="margin-top: 10px; font-size: 14px;">
                        <button class="copy-btn" onclick="copyToClipboard(this)">📋 复制链接</button>
                        <button onclick="setStatsId('${id}')">📊 查看该链接统计</button>
                        <div class="success-msg">✨ 极短链接已生成，用户每次访问直接跳转到下一个网址</div>
                    </div>
                `;

                prefillStatsId(id);
                fetchHistory();

            } catch (error) {
                if (handleAuthFailure(error)) {
                    return;
                }
                console.error('生成链接时出错：', error);
                alert('生成链接时出错：' + error.message);
            }
        }

        function copyText(text, button) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    if (!button) return;
                    const oldText = button.textContent;
                    button.textContent = '✅ 已复制！';
                    setTimeout(() => {
                        button.textContent = oldText;
                    }, 2000);
                });
                return;
            }

            const temp = document.createElement('textarea');
            temp.value = text;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);

            if (button) {
                const oldText = button.textContent;
                button.textContent = '✅ 已复制！';
                setTimeout(() => {
                    button.textContent = oldText;
                }, 2000);
            }
        }

        function copyToClipboard(button) {
            const input = button.previousElementSibling;
            copyText(input.value, button);
        }

        function openDistributedLink() {
            const input = document.getElementById('distributeInput').value.trim();
            if (!input) {
                alert('请粘贴链接！');
                return;
            }

            const workerMatch = input.match(/\/r\/([a-zA-Z0-9_-]{4,64})(?:[/?#]|$)/);
            const hashMatch = input.match(/#([a-zA-Z0-9_-]{4,64})(?:\?|$)/);
            const rawIdMatch = input.match(/^[a-zA-Z0-9_-]{4,64}$/);
            const id = (workerMatch && workerMatch[1]) || (hashMatch && hashMatch[1]) || (rawIdMatch && rawIdMatch[0]) || null;

            if (!id) {
                alert('无效的链接格式！请粘贴 Worker 短链、旧版 # 短链，或直接输入链接ID。');
                return;
            }

            window.location.href = buildShortUrl(id);
        }

        document.getElementById('historyOutput').textContent = '登录后可查看当前密码的历史记录。';
        // 密码保护
        document.getElementById('auth-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') checkPassword();
        });

        async function checkPassword() {
            const val = document.getElementById('auth-input').value.trim();
            const errEl = document.getElementById('auth-error');
            if (!val) {
                errEl.textContent = '请输入密码。';
                document.getElementById('auth-input').focus();
                return;
            }

            errEl.textContent = '验证中...';

            try {
                const payload = await apiPost({ action: 'login', password: val }, { skipStoredPassword: true });
                setStoredPassword(val);
                unlockForOwner(payload.owner);
            } catch (error) {
                errEl.textContent = '密码错误，请重试。';
                document.getElementById('auth-input').value = '';
                document.getElementById('auth-input').focus();
            }
        }

        restoreLogin();
    </script>
</body>
</html>
