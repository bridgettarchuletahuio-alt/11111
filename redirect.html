<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>链接转发中...</title>
</head>
<body>
    <script>
        (function() {
            const hash = window.location.hash.substring(1);
            
            if (!hash) return;
            
            const stored = localStorage.getItem('links_' + hash);
            if (!stored) return;
            
            try {
                const links = JSON.parse(stored);
                if (!Array.isArray(links) || links.length === 0) return;
                
                // 获取当前索引并计算下一个索引（循环）
                const index = parseInt(sessionStorage.getItem(hash + '_idx') || '0');
                const nextIndex = (index + 1) % links.length;
                
                // 保存下一个索引
                sessionStorage.setItem(hash + '_idx', nextIndex);
                
                // 直接跳转到当前链接（无任何提示或错误信息）
                window.location.href = links[index];
            } catch(e) {
                // 发生错误时也不显示任何提示，直接返回
                return;
            }
        })();
    </script>
</body>
</html>
